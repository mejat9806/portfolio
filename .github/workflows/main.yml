name: CI/CD Docker Image Build
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Tag Name
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            # Sanitizes title: lowercase and replace spaces/chars with '-'
            CLEAN=$(echo "${TITLE}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | cut -c1-100)
            echo "IMAGE_TAG=pr-$CLEAN" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Login & Build
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myimage:${{ env.IMAGE_TAG }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/myimage:${{ env.IMAGE_TAG }}

      - name: Trigger Coolify Webhook
        if: github.event_name == 'pull_request'
        run: |
          curl --request GET "${{ secrets.COOLIFY_WEBHOOK_URL }}&tag=${{ env.IMAGE_TAG }}" \
               --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
