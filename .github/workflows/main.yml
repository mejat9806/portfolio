name: CI/CD Docker Image Build
on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Generate the short SHA manually (GitHub doesn't provide it natively)
      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build Docker image
        # Logic: If PR, tag as 'pr-123'. If Push to main, tag as the short SHA.
        run: |
          TAG="${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || steps.vars.outputs.sha_short }}"
          docker build . -t ${{ secrets.DOCKER_USERNAME }}/myimage:$TAG
        
      # - name: Run tests
      #   run: |
      #     TAG="${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || steps.vars.outputs.sha_short }}"
      #     docker run --rm ${{ secrets.DOCKER_USERNAME }}/myimage:$TAG run_tests.sh

      - name: Push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/myimage:${{ steps.vars.outputs.sha_short }}
