name: CI/CD Docker Image Build

on:
  push:
    branches:
      - 'main'
      - 'master'
      - 'feat/*'
      - 'fix/*'
  pull_request:
    branches:
      - 'main'
      - 'master'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
          else
            TAG="${{ steps.vars.outputs.sha_short }}"
          fi
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myimage:$TAG .

      - name: Push image to Docker Hub
        run: |
          TAG=${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/myimage:$TAG

          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker tag ${{ secrets.DOCKER_USERNAME }}/myimage:$TAG ${{ secrets.DOCKER_USERNAME }}/myimage:latest
            docker push ${{ secrets.DOCKER_USERNAME }}/myimage:latest
          fi

      - name: Trigger Coolify Deploy
        if: github.event_name == 'pull_request'
        run: |
          curl --request GET "${{ secrets.COOLIFY_WEBHOOK_URL }}&tag=${{ env.IMAGE_TAG }}" \
               --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
